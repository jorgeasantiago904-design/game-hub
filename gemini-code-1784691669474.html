<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Ultra Gaming Hub</title>
  <style>
    /* Reset & Full Transparency */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent !important;
      overflow: hidden;
      color: #fff;
    }

    /* Layout Setup */
    .hub-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      padding: 20px;
    }

    /* Fixed Glassmorphism Search Bar */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: 20px;
      flex-shrink: 0;
    }

    .search-box {
      display: flex;
      align-items: center;
      width: 60%;
      max-width: 700px;
      background: rgba(20, 20, 30, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 8px 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      transition: all 0.3s ease;
    }

    .search-box:focus-within {
      border-color: #00f0ff;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    .search-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 1rem;
      padding: 8px;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    /* Scrollable Grid Layout */
    .content-area {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      overflow-y: auto;
      padding: 10px;
    }

    /* Scrollbar styling for a clean desktop feel */
    .content-area::-webkit-scrollbar {
      width: 8px;
    }
    .content-area::-webkit-scrollbar-track {
      background: transparent;
    }
    .content-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    /* Game Card Styling */
    .game-card {
      background: rgba(15, 15, 25, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: #00f0ff;
      box-shadow: 0 8px 20px rgba(0, 240, 255, 0.25);
    }

    .game-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .game-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .game-desc {
      font-size: 0.8rem;
      color: #ccc;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

    const grid = document.getElementById('gameGrid');

    function renderGames(gameList) {
      grid.innerHTML = '';
      gameList.forEach(game => {
        const card = document.createElement('a');
        card.className = 'game-card';
        card.href = game.url;
        card.target = '_self'; // Opens within iframe/OS tab context

        card.innerHTML = `
          <img src="${game.image}" alt="${game.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/150/000000/FFFFFF?text=No+Image'">
          <div class="game-title">${game.title}</div>
          <div class="game-desc">${game.desc}</div>
        `;
        grid.appendChild(card);
      });
    }

    function filterGames() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = games.filter(game => 
        game.title.toLowerCase().includes(query) || 
        game.desc.toLowerCase().includes(query)
      );
      renderGames(filtered);
    }

    // Initial render
    renderGames(games);
  </script>
