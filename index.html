<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydra Game Hub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f0f12;
    }
    ::-webkit-scrollbar-thumb {
      background: #2a2a34;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #7289da;
    }

    body {
      background-color: #0f0f12;
      color: #f1f1f1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Fullscreen Dynamic Hover Background */
    .bg-hover-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-size: cover;
      background-position: center;
      filter: blur(32px) brightness(0.2);
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), background-image 0.5s ease;
      z-index: 0;
      pointer-events: none;
    }

    .bg-hover-overlay.active {
      opacity: 1;
    }

    header {
      background-color: rgba(18, 18, 22, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 20px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a7b5ff, #7289da);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo img {
      width: 28px;
      height: 28px;
    }

    /* Category Navigation Tabs */
    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      background-color: rgba(0, 0, 0, 0.4);
      padding: 4px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tab-btn {
      background: none;
      border: none;
      color: #9090a0;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn img {
      width: 18px;
      height: 18px;
    }

    .tab-btn:hover {
      color: #fff;
    }

    .tab-btn.active {
      background-color: #7289da;
      color: #ffffff;
      box-shadow: 0 4px 14px rgba(114, 137, 218, 0.35);
    }

    .search-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-box {
      width: 250px;
    }

    .search-box input {
      width: 100%;
      padding: 9px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      font-size: 0.85rem;
      transition: all 0.25s ease;
    }

    .search-box input:focus {
      border-color: #7289da;
      background-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px rgba(114, 137, 218, 0.2);
    }

    .game-count-badge {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #a0a0b0;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .game-count-badge span {
      color: #7289da;
      font-weight: 700;
    }

    main {
      padding: 32px;
      flex-grow: 1;
      position: relative;
      z-index: 1;
    }

    /* Uniform Grid System */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 22px;
      width: 100%;
    }

    /* Rectangular Card Container */
    .game-card {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      background-color: #16161a;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
      isolation: isolate;
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .game-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(114, 137, 218, 0.6);
      box-shadow: 0 12px 28px rgba(114, 137, 218, 0.22);
    }

    .card-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .game-card:hover .card-thumb {
      transform: scale(1.1);
    }

    .card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: rgba(10, 10, 14, 0.75);
      backdrop-filter: blur(8px);
      color: #7289da;
      font-size: 0.68rem;
      font-weight: 800;
      padding: 4px 9px;
      border-radius: 6px;
      border: 1px solid rgba(114, 137, 218, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 2;
    }

    .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 75%;
      background: linear-gradient(to top, rgba(10, 10, 14, 0.95) 0%, rgba(10, 10, 14, 0.6) 60%, rgba(10, 10, 14, 0) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none;
    }

    .game-card:hover .card-overlay {
      transform: translateY(0);
    }

    .card-title {
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.25;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      color: #a0a0b0;
      font-size: 0.78rem;
      line-height: 1.35;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Fullscreen Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0b0b0e;
      display: none;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .player-container {
      width: 100vw;
      height: 100vh;
      background-color: #0b0b0e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .player-header {
      padding: 14px 28px;
      background-color: rgba(18, 18, 22, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 10;
    }

    .game-title-info {
      display: flex;
      flex-direction: column;
      max-width: 70%;
    }

    .game-title-display {
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
    }

    .game-desc-display {
      font-size: 0.82rem;
      color: #8a8a9a;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-controls {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .btn img {
      width: 18px;
      height: 18px;
    }

    .btn-secondary { 
      background-color: rgba(255, 255, 255, 0.08); 
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-secondary:hover { 
      background-color: rgba(255, 255, 255, 0.15); 
    }

    .btn-danger { 
      background-color: rgba(231, 76, 60, 0.85); 
    }
    .btn-danger:hover { 
      background-color: #e74c3c; 
      box-shadow: 0 0 12px rgba(231, 76, 60, 0.4);
    }

    .iframe-wrapper {
      flex-grow: 1;
      width: 100vw;
      height: calc(100vh - 65px);
      background-color: #000;
      position: relative;
    }

    .runner-status {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0b0e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 2;
      color: #7289da;
      font-size: 1.15rem;
      font-weight: 600;
    }

    .runner-status span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(114, 137, 218, 0.2);
      border-top-color: #7289da;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .runner-status.hidden {
      display: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .status-msg {
      text-align: center;
      color: #888;
      grid-column: 1 / -1;
      padding: 60px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div id="bgHoverOverlay" class="bg-hover-overlay"></div>

  <header>
    <div class="header-left">
      <div class="logo">
        <img src="https://img.icons8.com/color/48/game-controller.png" alt="Hub Logo">
        Code Runner Hub
      </div>
      <nav class="nav-tabs">
        <button class="tab-btn active" data-tab="all">All Games</button>
        <button class="tab-btn" data-tab="hydra">Hydra Network</button>
        <button class="tab-btn" data-tab="noahh">Noahh</button>
        <button class="tab-btn" data-tab="selenite">Selenite</button>
        <button class="tab-btn" data-tab="alexrworlds">Alexrworlds</button>
      </nav>
    </div>
    <div class="search-container">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search games...">
      </div>
      <div class="game-count-badge" id="gameCountBadge">Games: <span id="gameCount">0</span></div>
    </div>
  </header>

  <main>
    <div id="gamesGrid" class="games-grid">
      <div class="status-msg">Loading games library...</div>
    </div>
  </main>

  <div id="playerModal" class="modal-overlay">
    <div class="player-container">
      <div class="player-header">
        <div class="game-title-info">
          <div id="activeGameTitle" class="game-title-display">Playing Game</div>
          <div id="activeGameDesc" class="game-desc-display"></div>
        </div>
        <div class="player-controls">
          <button id="downloadBtn" class="btn btn-secondary">
            <img src="https://img.icons8.com/fluency/48/download.png" alt="Download"> Download Source
          </button>
          <button id="closeBtn" class="btn btn-danger">
            <img src="https://img.icons8.com/fluency/48/delete-sign.png" alt="Close"> Close
          </button>
        </div>
      </div>
      <div class="iframe-wrapper">
        <div id="runnerStatus" class="runner-status">
          <div class="spinner"></div>
          <span id="statusText">
            <img src="https://img.icons8.com/color/48/flash-on.png" alt="Lightning" style="width:22px;height:22px;">
            Code Runner: Fetching Source...
          </span>
        </div>
        <iframe id="gameIframe" allowfullscreen sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
      </div>
    </div>
  </div>

  <script>
    const FALLBACK_IMG = "https://via.placeholder.com/400x250/18181c/7289da?text=No+Image";

    const BASE_CDN = "https://cdn.jsdelivr.net/gh/1234chromebook1234-creator/hh@main/";
    const BASE_RAW_GITHUB = "https://raw.githubusercontent.com/1234chromebook1234-creator/hh/main/";
    const GAMES_FOLDER = "gmes/";

    const ALEXRWORLDS_JSON = "https://cdn.jsdelivr.net/gh/jorgeasantiago904-design/games.json@main/singlefilegames.json";

    const DATA = {
      hydra: [],
      noahh: [],
      selenite: [],
      alexrworlds: [],
      all: []
    };

    let activeTab = "all";
    let currentGame = null;
    let currentRawCode = "";

    function safeArray(obj) {
      if (!obj) return [];
      if (Array.isArray(obj)) return obj;
      return Object.values(obj);
    }

    function dedupeGames(array) {
      const seen = new Set();
      return array.filter(item => {
        if (!item || !item.name) return false;
        const key = item.name.toLowerCase().trim();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    // LOAD HYDRA NETWORK SOURCE
    async function loadHydra() {
      try {
        const r = await fetch(BASE_CDN + "gmes.json");
        if (!r.ok) return;
        const d = await r.json();
        let rawArray = safeArray(d);
        
        DATA.hydra = dedupeGames(rawArray.map(g => {
          if (!g || typeof g !== "object") return null;

          let file = g.file_name || g.link || g.url || g.file || g.path || g.html;
          let title = g.title || g.name || g.game || "Untitled Game";

          if (!file) return null;
          
          file = String(file).replace(/^\/+/, "");
          let rawGameUrl = file.startsWith("http") ? file : (BASE_RAW_GITHUB + (file.startsWith(GAMES_FOLDER) ? file : GAMES_FOLDER + file));

          let thumb = g.thumb || g.image || g.img || g.thumbnail || FALLBACK_IMG;
          if (thumb !== FALLBACK_IMG && !thumb.startsWith("http")) {
            thumb = BASE_CDN + thumb.replace(/^\/+/, "");
          }
          
          return { 
            name: title,
            description: g.description || g.desc || "",
            img: thumb,
            url: rawGameUrl,
            source: "hydra"
          };
        }).filter(Boolean));
      } catch (e) {
        console.error("Error loading Hydra games:", e);
      }
    }

    // LOAD NOAHH SOURCE
    async function loadNoahh() {
      try {
        const r = await fetch("https://raw.githubusercontent.com/NoahsAmazingTutoringHelp/Noahs-Calculus-Tutor/master/games.js");
        if (!r.ok) return;
        const jsText = await r.text();
        
        let parsedData = [];
        try {
          const cleanJs = jsText.replace(/^(const|let|var)\s+\w+\s*=\s*/, '').replace(/;?\s*$/, '');
          parsedData = new Function(`return ${cleanJs}`)();
        } catch (e) {
          const jsonMatch = jsText.match(/\[\s*\{[\s\S]*\}\s*\]/);
          if (jsonMatch) {
            parsedData = JSON.parse(jsonMatch[0]);
          }
        }

        const rawArray = safeArray(parsedData);
        
        DATA.noahh = dedupeGames(rawArray.map(g => {
          if (!g) return null;
          
          const title = g.title || g.name || g.label;
          const description = g.description || g.desc || g.summary || "";
          let rawPath = g.url || g.link || g.path || g.file || "";
          let rawImg = g.image || g.img || g.thumbnail || g.icon || FALLBACK_IMG;

          if (!title || !rawPath) return null;

          let fileName = String(rawPath)
            .replace(/^file:\/\/\/?/i, '')
            .replace(/^.*[\/\\]view=games[\/\\]?/i, '')
            .replace(/^.*[\/\\]games[\/\\]?/i, '')
            .replace(/^\/+/, '')
            .trim();

          if (fileName && !fileName.endsWith('.html') && !fileName.includes('.')) {
            fileName += '.html';
          }

          const rawGithubUrl = `https://raw.githubusercontent.com/NoahsAmazingTutoringHelp/Noahs-Calculus-Tutor/master/games/${fileName}`;

          if (rawImg !== FALLBACK_IMG && !rawImg.startsWith("http") && !rawImg.startsWith("data:")) {
            rawImg = `https://raw.githubusercontent.com/NoahsAmazingTutoringHelp/Noahs-Calculus-Tutor/master/${rawImg.replace(/^\/+/, '')}`;
          }

          return {
            name: title,
            description: description,
            img: rawImg,
            url: rawGithubUrl,
            source: "noahh"
          };
        }).filter(Boolean));

      } catch (e) {
        console.error("Error loading Noahh games:", e);
      }
    }

    // LOAD SELENITE SOURCE
    async function loadSelenite() {
      try {
        const r = await fetch("https://math-quests-cc.dk-ubg.workers.dev/resources/games.json");
        if (!r.ok) return;
        const d = await r.json();
        DATA.selenite = dedupeGames(safeArray(d).map(g => {
          if (!g?.name || !g?.image || !g?.directory) return null;
          const dir = String(g.directory).replace(/^\/+/, "").replace(/\/+$/, "");
          return {
            name: g.name,
            description: g.description || "",
            img: "https://math-quests-cc.dk-ubg.workers.dev/resources/semag/" + dir + "/" + g.image,
            url: "https://selenite.cc/resources/semag/" + dir + "/index.html",
            source: "selenite"
          };
        }).filter(Boolean));
      } catch (e) {
        console.error("Error loading Selenite games:", e);
      }
    }

    // LOAD ALEXRWORLDS SOURCE
    async function loadAlexrworlds() {
      try {
        const r = await fetch(ALEXRWORLDS_JSON);
        if (!r.ok) return;
        const d = await r.json();
        DATA.alexrworlds = dedupeGames(safeArray(d).map(g => {
          if (!g) return null;
          const title = g.title || g.name || "Unknown";
          return {
            name: title,
            description: g.description || "",
            img: g.img || g.image || g.thumbnail || FALLBACK_IMG,
            url: g.url || g.link || ("/app-viewer/alexr-world-s/?view=" + encodeURIComponent(title)),
            source: "alexrworlds"
          };
        }).filter(Boolean));
      } catch (e) {
        console.error("Error loading Alexrworlds games:", e);
      }
    }

    async function initData() {
      await Promise.all([
        loadHydra(),
        loadNoahh(),
        loadSelenite(),
        loadAlexrworlds()
      ]);

      DATA.all = dedupeGames([
        ...DATA.hydra, 
        ...DATA.noahh, 
        ...DATA.selenite,
        ...DATA.alexrworlds
      ]);
      updateTabDisplay();
    }

    const gamesGrid = document.getElementById('gamesGrid');
    const searchInput = document.getElementById('searchInput');
    const gameCountEl = document.getElementById('gameCount');
    const playerModal = document.getElementById('playerModal');
    const gameIframe = document.getElementById('gameIframe');
    const runnerStatus = document.getElementById('runnerStatus');
    const statusText = document.getElementById('statusText');
    const activeGameTitle = document.getElementById('activeGameTitle');
    const activeGameDesc = document.getElementById('activeGameDesc');
    const bgHoverOverlay = document.getElementById('bgHoverOverlay');

    function getActiveList() {
      if (activeTab === "hydra") return DATA.hydra;
      if (activeTab === "noahh") return DATA.noahh;
      if (activeTab === "selenite") return DATA.selenite;
      if (activeTab === "alexrworlds") return DATA.alexrworlds;
      return DATA.all;
    }

    function updateTabDisplay() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      const currentList = getActiveList();
      
      const filtered = currentList.filter(game => 
        game.name.toLowerCase().includes(searchTerm) ||
        (game.description && game.description.toLowerCase().includes(searchTerm))
      );

      renderGames(filtered);
    }

    function renderGames(list) {
      gamesGrid.innerHTML = '';
      gameCountEl.textContent = list ? list.length : 0;

      if (!list || list.length === 0) {
        gamesGrid.innerHTML = `<div class="status-msg">No games found.</div>`;
        return;
      }

      list.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';

        card.innerHTML = `
          <div class="card-badge">${game.source}</div>
          <img class="card-thumb" src="${game.img}" alt="${game.name}" loading="lazy" onerror="this.onerror=null;this.src='${FALLBACK_IMG}';">
          <div class="card-overlay">
            <div class="card-title">${game.name}</div>
            ${game.description ? `<div class="card-desc">${game.description}</div>` : ''}
          </div>
        `;

        card.addEventListener('mouseenter', () => {
          if (game.img && game.img !== FALLBACK_IMG) {
            bgHoverOverlay.style.backgroundImage = `url('${game.img}')`;
            bgHoverOverlay.classList.add('active');
          }
        });

        card.addEventListener('mouseleave', () => {
          bgHoverOverlay.classList.remove('active');
        });

        card.addEventListener('click', () => runGameCode(game));
        gamesGrid.appendChild(card);
      });
    }

    // CODE RUNNER ENGINE
    async function runGameCode(game) {
      currentGame = game;
      currentRawCode = "";
      activeGameTitle.textContent = game.name;
      activeGameDesc.textContent = game.description || "";
      
      playerModal.classList.add('active');
      runnerStatus.classList.remove('hidden');
      statusText.innerHTML = `<img src="https://img.icons8.com/color/48/flash-on.png" style="width:22px;height:22px;"> Code Runner: Loading Game Source...`;

      // Direct iframe embedding for web-hosted sources that allow cross-origin framing
      if (game.source === "selenite" || game.source === "alexrworlds") {
        gameIframe.removeAttribute('srcdoc');
        gameIframe.src = game.url;
        setTimeout(() => runnerStatus.classList.add('hidden'), 500);
        return;
      }

      try {
        const response = await fetch(game.url);
        if (!response.ok) throw new Error("Could not fetch game raw code.");
        
        currentRawCode = await response.text();

        statusText.innerHTML = `<img src="https://img.icons8.com/color/48/flash-on.png" style="width:22px;height:22px;"> Code Runner: Compiling & executing game...`;

        let baseHref = "";
        if (game.source === "hydra") {
          const relativeFolder = game.url.replace(BASE_RAW_GITHUB, "");
          baseHref = BASE_CDN + relativeFolder.substring(0, relativeFolder.lastIndexOf('/') + 1);
        } else if (game.source === "noahh") {
          baseHref = "https://cdn.jsdelivr.net/gh/NoahsAmazingTutoringHelp/Noahs-Calculus-Tutor@master/games/";
        }

        let injectedCode = currentRawCode;

        if (baseHref) {
          if (/<head[^>]*>/i.test(injectedCode)) {
            injectedCode = injectedCode.replace(/<head[^>]*>/i, `$&<base href="${baseHref}">`);
          } else {
            injectedCode = `<base href="${baseHref}">` + injectedCode;
          }
        }

        gameIframe.removeAttribute('src');
        gameIframe.srcdoc = injectedCode;

        setTimeout(() => {
          runnerStatus.classList.add('hidden');
        }, 400);

      } catch (err) {
        console.error("Code Runner Error:", err);
        statusText.innerHTML = `<img src="https://img.icons8.com/color/48/error.png" style="width:22px;height:22px;"> Failed to fetch raw code. Loading direct frame...`;
        
        setTimeout(() => {
          gameIframe.removeAttribute('srcdoc');
          gameIframe.src = game.url;
          runnerStatus.classList.add('hidden');
        }, 1200);
      }
    }

    function closeGame() {
      playerModal.classList.remove('active');
      gameIframe.srcdoc = '';
      gameIframe.src = 'about:blank';
      runnerStatus.classList.add('hidden');
      currentGame = null;
      currentRawCode = "";
    }

    // Tab Navigation Switcher
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        activeTab = e.currentTarget.getAttribute('data-tab');
        updateTabDisplay();
      });
    });

    // Search Filter
    searchInput.addEventListener('input', updateTabDisplay);

    // Modal Controls
    document.getElementById('closeBtn').addEventListener('click', closeGame);

    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!currentGame) return;

      const content = currentRawCode || `<iframe src="${currentGame.url}" style="width:100vw;height:100vh;border:none;"></iframe>`;
      const blob = new Blob([content], { type: 'text/html' });
      const downloadUrl = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = `${currentGame.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(downloadUrl);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && playerModal.classList.contains('active')) {
        closeGame();
      }
    });

    initData();
  </script>
</body>
</html>
